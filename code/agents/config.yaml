# Rehearsal mode: every run is a throwaway test, so recent words are NOT
# blocked between runs. TURN THIS OFF (false) before the first real show,
# or consecutive shows may repeat the same words.
rehearsal_mode: true

# Define an agent by adding a block here. No code changes needed.
# Per-agent model routing lets you spend money where quality matters
# (hints) and save it where volume is high (scoring).
agents:
  hint_generator:
    provider: anthropic          # anthropic | openai
    model: claude-sonnet-4-6
    temperature: 0.8
    max_tokens: 400
    skill: hint_generation       # -> skills/hint_generation/SKILL.md
    output: json                 # json | text

  difficulty_monitor:
    provider: openai             # cheap model for high-volume scoring
    model: gpt-4o-mini
    temperature: 0.2
    max_tokens: 300
    skill: difficulty_tuning
    output: json

  trend_researcher:
    provider: openrouter           # A/B winner: best Armenian wildcards, only
                                   # model that mines the Armenian YouTube feed
    model: google/gemini-3.1-pro-preview   # preview slug — if it 404s one day,
                                           # fall back to google/gemini-2.5-pro
    temperature: 0.5
    max_tokens: 8000               # reasoning models spend hidden tokens
                                   # before the JSON; give generous headroom
    skill: trend_research
    output: json
