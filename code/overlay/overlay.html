<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Quiz Overlay</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --panel: rgba(14, 16, 24, 0.86);
    --panel-edge: rgba(255, 255, 255, 0.08);
    --gold: #FFC23D;
    --gold-soft: rgba(255, 194, 61, 0.16);
    --leader: #34E0A1;
    --text: #F5F7FA;
    --muted: #8A93A6;
    --danger: #FF5468;
    --row-h: 72px;
    --row-gap: 10px;
    /* Title-safe insets. The overlay is a flat 1920x1080 frame composited in
       OBS; we can't react to the viewer's device. On YouTube iOS, tapping the
       live-chat box raises the keyboard and the player CROPS the video top and
       bottom, which used to cut the lower-third in half. Keep the leaderboard
       and the hint bar inside these margins so they survive that crop. Bump
       --safe-bottom if the hint still clips on a re-test. */
    --safe-top: 120px;
    --safe-bottom: 190px;
  }

  /* Transparent canvas: OBS composites everything below over your video. */
  html, body {
    margin: 0;
    width: 1920px;
    height: 1080px;
    background: transparent;
    overflow: hidden;
    font-family: "Inter", system-ui, sans-serif;
    color: var(--text);
    -webkit-font-smoothing: antialiased;
  }

  /* ---------- Leaderboard (top-right) ---------- */
  .board {
    position: absolute;
    top: var(--safe-top);
    left: 48px;
    width: 560px;
    background: var(--panel);
    border: 1px solid var(--panel-edge);
    border-radius: 18px;
    padding: 20px 20px 24px;
    backdrop-filter: blur(8px);
    box-shadow: 0 24px 60px rgba(0, 0, 0, 0.45);
    z-index: 10;
    /* Only animated at the end, when it glides to center stage — during the
       show top/left never change, so this costs nothing. */
    transition: top 1.2s cubic-bezier(0.16, 1, 0.3, 1),
                left 1.2s cubic-bezier(0.16, 1, 0.3, 1),
                width 1.2s cubic-bezier(0.16, 1, 0.3, 1),
                transform 1.2s cubic-bezier(0.16, 1, 0.3, 1);
  }
  /* End of show: the SAME board (no duplicate markup, no state desync) moves
     to center stage and grows slightly, over the end card backdrop. */
  .board.centered {
    /* Biased toward the upper half, not true center: at 5 rows the card runs
       tall, and the thank-you text needs clearance below it. Checked against
       a real screenshot — true center let the two overlap. */
    top: 46%;
    left: 50%;
    width: 640px;
    transform: translate(-50%, -58%) scale(1.08);
    z-index: 50;
  }
  .board__head {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 2px 4px 18px;
  }
  .board__title {
    font-family: "Space Grotesk", sans-serif;
    font-weight: 700;
    font-size: 42px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text);
  }
  .live {
    display: inline-flex;
    align-items: center;
    gap: 14px;
    margin-left: auto;
    font-size: 24px;
    font-weight: 600;
    letter-spacing: 0.12em;
    color: var(--muted);
    text-transform: uppercase;
  }
  .live__dot {
    width: 18px; height: 18px;
    border-radius: 50%;
    background: var(--danger);
    box-shadow: 0 0 0 0 rgba(255, 84, 104, 0.6);
    animation: pulse 1.8s infinite;
  }
  /* The halo expands to the dot's own width, so it scales with it. */
  @keyframes pulse {
    0%   { box-shadow: 0 0 0 0 rgba(255, 84, 104, 0.55); }
    70%  { box-shadow: 0 0 0 18px rgba(255, 84, 104, 0); }
    100% { box-shadow: 0 0 0 0 rgba(255, 84, 104, 0); }
  }

  /* Rows are absolutely positioned and moved with translateY, so rank changes
     glide instead of jumping. Each row is keyed by player name. */
  .rows {
    position: relative;
  }
  .row {
    position: absolute;
    left: 0; right: 0;
    height: var(--row-h);
    display: flex;
    align-items: center;
    padding: 0 14px;
    border-radius: 12px;
    background: rgba(255, 255, 255, 0.03);
    transition: transform 0.55s cubic-bezier(0.22, 1, 0.36, 1),
                background-color 0.5s ease, opacity 0.4s ease;
    will-change: transform;
  }
  .row__rank {
    font-family: "Space Grotesk", sans-serif;
    font-weight: 700;
    font-size: 38px;
    width: 60px;
    color: var(--muted);
    font-variant-numeric: tabular-nums;
  }
  .row__name {
    flex: 1;
    font-weight: 500;
    font-size: 40px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-right: 10px;
  }
  .row__score {
    font-family: "Space Grotesk", sans-serif;
    font-weight: 700;
    font-size: 42px;
    color: var(--text);
    font-variant-numeric: tabular-nums;
  }
  /* Leader gets the gold treatment. */
  .row.is-leader {
    background: var(--gold-soft);
    border: 1px solid rgba(255, 194, 61, 0.35);
  }
  .row.is-leader .row__rank,
  .row.is-leader .row__score { color: var(--gold); }
  /* Brief flash when a player's score just went up. */
  .row.bumped { background: rgba(52, 224, 161, 0.22); }

  /* ---------- Question lower-third (bottom center) ---------- */
  .qbar {
    position: absolute;
    /* Anchored to the RIGHT so its left edge clears the leaderboard column
       (left:48 + 560 wide = 608). Centering used to put the bar's left edge at
       ~370, overlapping the board — with >3 names the lower rows collided with
       the bar. Right-anchoring makes them separate columns for any name count. */
    right: 48px;
    bottom: var(--safe-bottom);
    width: 1180px;
    display: flex;
    align-items: center;
    gap: 22px;
    background: var(--panel);
    border: 1px solid var(--panel-edge);
    border-radius: 20px;
    padding: 22px 28px;
    backdrop-filter: blur(8px);
    box-shadow: 0 24px 60px rgba(0, 0, 0, 0.45);
    opacity: 0;
    transition: opacity 0.4s ease;
  }
  .qbar.show { opacity: 1; }
  .qbadge {
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 140px; height: 140px;
    border-radius: 24px;
    background: var(--gold);
    color: #1a1407;
  }
  .qbadge__num {
    font-family: "Space Grotesk", sans-serif;
    font-weight: 700;
    font-size: 62px;
    line-height: 1;
  }
  .qbadge__of {
    font-size: 17px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    opacity: 0.7;
    margin-top: 3px;
  }
  .qtext {
    flex: 1;
    font-size: 52px;
    font-weight: 500;
    line-height: 1.3;
  }

  /* ---------- Countdown ring (right end of the bar) ---------- */
  /* Always laid out, even with no window running. Taking it out of the flow
     when the countdown ends would reflow the hint text sideways for a frame —
     right as the answer appears, which reads as a glitch. When there is nothing
     to count, the arc is simply empty and the faint track holds the space. */
  .timer {
    flex-shrink: 0;
    position: relative;
    width: 92px; height: 92px;
  }
  .timer svg { transform: rotate(-90deg); }
  .timer__track { stroke: rgba(255, 255, 255, 0.12); }
  .timer__fill {
    stroke: var(--gold);
    stroke-linecap: round;
    transition: stroke-dashoffset 0.15s linear, stroke 0.3s ease;
  }
  /* The ring alone carries the time: the shrinking arc reads at a glance and
     doesn't put a hard number on screen. Windows are ~30s and viewers are
     3-10s behind the stream, so a ticking digit would be a lie anyway. */
  .timer.low .timer__fill { stroke: var(--danger); }
  .timer.low { animation: shake 0.9s ease-in-out infinite; }

  /* Answer reveal: same bar, unmistakably not a hint. */
  .qbar.reveal { border-color: rgba(52, 224, 161, 0.45); }
  .qbar.reveal .qtext { color: var(--leader); font-weight: 600; }
  .qbar.reveal .qbadge { background: var(--leader); }
  /* No clock next to an answer — there is nothing left to count. Hidden rather
     than removed, so the bar keeps its shape and the text doesn't jump. */
  .qbar.reveal .timer { visibility: hidden; }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-2px); }
    75% { transform: translateX(2px); }
  }

  /* ---------- End card (after the outro) ---------- */
  /* NOT transparent, unlike everything above: once the host video finishes,
     this frame has nothing else behind it, so it needs its own background
     or the stream goes to black. */
  .endcard-bg {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 900px 640px at 50% 40%, rgba(255, 194, 61, 0.10), transparent 60%),
      radial-gradient(ellipse at 50% 50%, rgba(36, 24, 54, 0.94), rgba(8, 9, 13, 0.985) 72%);
    opacity: 0;
    z-index: 5;
    pointer-events: none;
    transition: opacity 1.1s ease;
  }
  .endcard-bg.show { opacity: 1; }

  .confetti-layer {
    position: absolute;
    inset: 0;
    overflow: hidden;
    z-index: 40;
    pointer-events: none;
  }
  .confetti-piece {
    position: absolute;
    top: -24px;
    width: 14px;
    height: 20px;
    opacity: 0.95;
    will-change: transform, opacity;
    animation-name: confetti-fall;
    animation-timing-function: cubic-bezier(0.37, 0, 0.63, 1);
    animation-fill-mode: forwards;
  }
  @keyframes confetti-fall {
    to { transform: translateY(1160px) rotate(var(--spin, 540deg)); opacity: 0.2; }
  }

  .endcard-text {
    position: absolute;
    top: 84%;
    left: 50%;
    /* A definite width, or a centered absolute box with only `left` set
       shrink-wraps using just the space to ITS RIGHT (960px, half the
       frame) for the wrap calculation — the transform recenters it for
       paint, but layout already wrapped the text one word too early. */
    width: 1600px;
    text-align: center;
    z-index: 45;
    opacity: 0;
    transform: translate(-50%, 14px);
    transition: opacity 1s ease 0.5s, transform 1s cubic-bezier(0.16, 1, 0.3, 1) 0.5s;
  }
  .endcard-text.show { opacity: 1; transform: translate(-50%, 0); }
  .endcard-text__thanks {
    font-family: "Space Grotesk", sans-serif;
    font-weight: 700;
    font-size: 54px;
    letter-spacing: 0.01em;
    color: var(--text);
    white-space: nowrap;
  }
  .endcard-text__sub {
    margin-top: 10px;
    font-size: 28px;
    color: var(--muted);
  }

  @media (prefers-reduced-motion: reduce) {
    .row, .timer__fill, .board { transition: none; }
    .live__dot, .timer.low { animation: none; }
    .confetti-piece { animation: none; opacity: 0; }
  }

  /* ---------- Mobile (phone / direct browser view) ---------- */
  @media (max-width: 900px) {
    html, body {
      width: 100vw;
      height: 100vh;
      background: transparent;
      overflow: hidden;
    }
    .board {
      position: absolute;
      top: 12px; left: 12px;
      width: 260px;
      padding: 12px 14px 16px;
      border-radius: 12px;
    }
    .board__head { margin-bottom: 10px; }
    .board__title { font-size: 15px; }
    .live { font-size: 22px; }
    .live__dot { width: 14px; height: 14px; }
    /* Rows switch to normal flow — no absolute positioning needed. */
    .rows { display: flex; flex-direction: column; gap: 5px; }
    .row  { position: relative !important; height: 42px; padding: 0 10px; border-radius: 8px; transform: none !important; }
    .row__rank  { font-size: 15px; width: 28px; }
    .row__name  { font-size: 15px; }
    .row__score { font-size: 16px; }
    .qbar {
      position: absolute;
      left: 12px; right: 12px; bottom: 16px;
      transform: none;
      width: auto;
      padding: 12px 14px;
      gap: 12px;
      border-radius: 14px;
    }
    .qtext { font-size: 16px; }
    .qbadge { width: 48px; height: 48px; border-radius: 10px; }
    .qbadge__num { font-size: 20px; }
    .qbadge__of { font-size: 9px; }
    .timer { width: 48px; height: 48px; }
    .timer svg { width: 48px; height: 48px; }
    .board.centered { width: 280px; transform: translate(-50%, -46%) scale(1.05); }
    .endcard-text__thanks { font-size: 22px; }
    .endcard-text__sub { font-size: 14px; }
    .confetti-piece { width: 8px; height: 12px; }
  }
</style>
</head>
<body>
  <!-- End card: hidden until phase "ended". Sits below the board/qbar in DOM
       order so it never intercepts anything during the show. -->
  <div class="endcard-bg" id="endcardBg"></div>
  <div class="confetti-layer" id="confettiLayer"></div>
  <div class="endcard-text" id="endcardText">
    <div class="endcard-text__thanks">Շնորհակալություն, որ մեզ հետ էիք</div>
    <div class="endcard-text__sub">Կհանդիպենք հաջորդ եթերում</div>
  </div>

  <!-- Leaderboard -->
  <div class="board">
    <div class="board__head">
      <span class="board__title">Առաջատարներ</span>
      <span class="live"><span class="live__dot"></span>Live</span>
    </div>
    <div class="rows" id="rows"></div>
  </div>

  <!-- Question + countdown -->
  <div class="qbar" id="qbar">
    <div class="qbadge">
      <span class="qbadge__num" id="qnum">–</span>
      <span class="qbadge__of" id="qof">Հարց</span>
    </div>
    <div class="qtext" id="qtext"></div>
    <div class="timer" id="timer">
      <svg width="92" height="92" viewBox="0 0 92 92">
        <circle class="timer__track" cx="46" cy="46" r="40" fill="none" stroke-width="7"/>
        <circle class="timer__fill"  cx="46" cy="46" r="40" fill="none" stroke-width="7"
                id="ring" stroke-dasharray="251.3" stroke-dashoffset="0"/>
      </svg>
    </div>
  </div>

<script>
  const POLL_MS = 1000;
  const RING_CIRCUMFERENCE = 2 * Math.PI * 40; // r = 40
  const rowsEl = document.getElementById("rows");
  const ROW_TOTAL = 72 + 10; // row height + gap, desktop only (keep in sync with --row-h)
  const isMobile = () => window.innerWidth <= 900;

  // Persistent row nodes keyed by player name, so rank changes animate.
  const rowNodes = new Map();
  const prevScores = new Map();

  // The countdown is computed locally from window_ends_at (epoch seconds),
  // so it ticks smoothly between the once-a-second state polls.
  let windowEndsAt = null;
  let windowTotal = null; // seconds the window started with, for the ring fraction

  // ---------- End card ----------
  const boardEl = document.querySelector(".board");
  const endcardBg = document.getElementById("endcardBg");
  const endcardText = document.getElementById("endcardText");
  const confettiLayer = document.getElementById("confettiLayer");
  const CONFETTI_COLORS = ["#FFC23D", "#34E0A1", "#FF5468", "#8A93A6", "#F5F7FA"];
  let ended = false;
  let confettiTimer = null;

  function spawnConfetti(n) {
    for (let i = 0; i < n; i++) {
      const el = document.createElement("div");
      el.className = "confetti-piece";
      el.style.left = (Math.random() * 100) + "%";
      el.style.background = CONFETTI_COLORS[Math.floor(Math.random() * CONFETTI_COLORS.length)];
      const spin = (Math.random() > 0.5 ? 1 : -1) * (360 + Math.random() * 360);
      el.style.setProperty("--spin", spin + "deg");
      const duration = 3.2 + Math.random() * 2.4;
      el.style.animationDuration = duration + "s";
      el.style.animationDelay = (Math.random() * 0.5) + "s";
      confettiLayer.appendChild(el);
      setTimeout(() => el.remove(), (duration + 1) * 1000);
    }
  }

  function enterEndcard() {
    if (ended) return;
    ended = true;
    document.getElementById("qbar").classList.remove("show");
    boardEl.classList.add("centered");
    endcardBg.classList.add("show");
    endcardText.classList.add("show");
    spawnConfetti(100);                                    // initial burst
    confettiTimer = setInterval(() => spawnConfetti(6), 260); // gentle trickle
  }

  function exitEndcard() {
    if (!ended) return;
    ended = false;
    boardEl.classList.remove("centered");
    endcardBg.classList.remove("show");
    endcardText.classList.remove("show");
    if (confettiTimer) { clearInterval(confettiTimer); confettiTimer = null; }
    confettiLayer.innerHTML = "";
  }

  function renderLeaderboard(board) {
    const top = (board || []).slice(0, 5);
    const seen = new Set();

    top.forEach((p, i) => {
      seen.add(p.name);
      let node = rowNodes.get(p.name);
      if (!node) {
        node = document.createElement("div");
        node.className = "row";
        node.innerHTML =
          '<span class="row__rank"></span>' +
          '<span class="row__name"></span>' +
          '<span class="row__score"></span>';
        rowsEl.appendChild(node);
        rowNodes.set(p.name, node);
      }
      node.querySelector(".row__rank").textContent = "#" + (i + 1);
      node.querySelector(".row__name").textContent = p.name;
      node.querySelector(".row__score").textContent = p.score;
      if (!isMobile()) node.style.transform = "translateY(" + (i * ROW_TOTAL) + "px)";
      node.classList.toggle("is-leader", i === 0);

      // Flash the row if this player's score just increased.
      const prev = prevScores.get(p.name);
      if (prev !== undefined && p.score > prev) {
        node.classList.add("bumped");
        setTimeout(() => node.classList.remove("bumped"), 900);
      }
      prevScores.set(p.name, p.score);
    });

    // Remove players who dropped out of the top 10.
    for (const [name, node] of rowNodes) {
      if (!seen.has(name)) {
        node.style.opacity = "0";
        setTimeout(() => { node.remove(); }, 400);
        rowNodes.delete(name);
        prevScores.delete(name);
      }
    }
    rowsEl.style.height = isMobile() ? "auto" : (top.length * ROW_TOTAL) + "px";
  }

  function renderQuestion(q, phase) {
    const bar = document.getElementById("qbar");
    if (!q || !q.text) { bar.classList.remove("show"); return; }
    document.getElementById("qnum").textContent = q.number ?? "–";
    // Reads as "2" over "10-ից" — i.e. 2 out of 10.
    document.getElementById("qof").textContent = q.total ? (q.total + "-ից") : "Հարց";
    document.getElementById("qtext").textContent = q.text;
    // "reveal" is the host announcing a word's answer. Colour it apart from the
    // hints so nobody reads the answer as one more clue and keeps guessing.
    bar.classList.toggle("reveal", phase === "reveal");
    bar.classList.add("show");
  }

  // Smooth countdown loop, independent of polling.
  function tickTimer() {
    const timer = document.getElementById("timer");
    const ring = document.getElementById("ring");

    // Nothing running, or the window just ended: empty the arc but leave the
    // ring where it is. The layout must not move — the answer lands right here.
    const idle = () => {
      ring.style.strokeDashoffset = RING_CIRCUMFERENCE;
      timer.classList.remove("low");
    };

    if (windowEndsAt === null) { idle(); return; }
    const remaining = windowEndsAt - (Date.now() / 1000);
    if (remaining <= 0) {
      idle();
      windowEndsAt = null;
      return;
    }
    const total = windowTotal || remaining;
    const frac = Math.max(0, Math.min(1, remaining / total));
    ring.style.strokeDashoffset = (RING_CIRCUMFERENCE * (1 - frac)).toFixed(1);
    timer.classList.toggle("low", remaining <= 5);
  }
  setInterval(tickTimer, 100);

  async function poll() {
    try {
      const res = await fetch("/state", { cache: "no-store" });
      const s = await res.json();
      renderLeaderboard(s.leaderboard);
      renderQuestion(s.question, s.phase);
      if (s.phase === "ended") enterEndcard(); else exitEndcard();

      // Track when a new window starts so the ring knows its full duration.
      if (s.window_ends_at && s.window_ends_at !== windowEndsAt) {
        const fresh = s.window_ends_at - (Date.now() / 1000);
        if (fresh > 0) windowTotal = fresh;
      }
      windowEndsAt = s.window_ends_at || null;
    } catch (e) {
      // Server not up yet or mid-restart: keep the last frame, try again.
    }
  }
  poll();
  setInterval(poll, POLL_MS);
  window.addEventListener("resize", poll);
</script>
</body>
</html>
